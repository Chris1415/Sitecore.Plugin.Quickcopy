<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuickCopy POC v1 — Page Card Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="demo-bar" role="toolbar" aria-label="POC demo controls">
    <div class="demo-bar__title">QuickCopy POC v1 — Page Card Hub</div>
    <div class="demo-bar__actions">
      <button type="button" class="demo-btn" data-demo="toggle-published">Toggle published state</button>
      <button type="button" class="demo-btn" data-demo="force-error">Force error: Preview URL</button>
      <button type="button" class="demo-btn" data-demo="reset">Reset states</button>
    </div>
  </header>

  <main class="stage" aria-label="Mocked Pages editor stage">
    <div class="canvas" aria-hidden="true">
      <div class="canvas__grid"></div>
      <div class="canvas__caption">Mocked Pages editor canvas — not interactive</div>
    </div>

    <aside class="quickcopy" id="quickcopy" aria-label="QuickCopy panel">
      <div class="qc__ambient" aria-hidden="true"></div>

      <!-- Slim header -->
      <div class="qc__header">
        <div class="qc__wordmark">QuickCopy</div>
        <button type="button" class="qc__theme" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
          <svg class="qc__theme-icon qc__theme-icon--moon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="qc__theme-icon qc__theme-icon--sun" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="qc__divider" aria-hidden="true"></div>

      <!-- Kicker -->
      <div class="qc__kicker">Editing <span class="qc__kicker-arrow">&rarr;</span></div>

      <!-- Hero title -->
      <h1 class="qc__title" id="pageTitle">Spring Campaign Landing Page</h1>

      <!-- Metadata / status slot -->
      <div class="qc__meta" id="metaSlot">
        <span class="qc__meta-text" id="metaText">Northwind Marketing <span class="qc__meta-dot">&middot;</span> en</span>
      </div>

      <!-- Icon chip row -->
      <div class="qc__chips" role="group" aria-label="Quick copy actions">
        <button type="button" class="qc-chip" data-action="live" aria-label="Copy Live URL">
          <span class="qc-chip__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M3.5 12h17M12 3.5c2.6 3 4 5.7 4 8.5s-1.4 5.5-4 8.5c-2.6-3-4-5.7-4-8.5s1.4-5.5 4-8.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </span>
        </button>

        <button type="button" class="qc-chip" data-action="preview" aria-label="Copy Preview URL">
          <span class="qc-chip__glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12s-3.5 6.5-9.5 6.5S2.5 12 2.5 12z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.75" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </span>
        </button>

        <button type="button" class="qc-chip" data-action="itemid" aria-label="Copy Item ID">
          <span class="qc-chip__glyph qc-chip__glyph--type" aria-hidden="true">#</span>
        </button>

        <button type="button" class="qc-chip" data-action="title" aria-label="Copy Page Title">
          <span class="qc-chip__glyph qc-chip__glyph--type qc-chip__glyph--aA" aria-hidden="true">aA</span>
        </button>
      </div>

      <!-- Hover preview card (single instance, repositioned on hover) -->
      <div class="qc-preview" id="hoverPreview" role="tooltip" aria-hidden="true">
        <div class="qc-preview__label" id="previewLabel">Live URL</div>
        <div class="qc-preview__value" id="previewValue">https://www.example.com/products/spring-campaign</div>
      </div>

      <!-- Share Link split-button CTA -->
      <div class="qc__share-wrap">
        <div class="qc-share" role="group" aria-label="Share Link">
          <button type="button" class="qc-share__main" id="shareMain" aria-label="Share this page (Copy as Markdown)">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" class="qc-share__icon">
              <path d="M12 3v12M12 3l-4 4M12 3l4 4M5 14v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="qc-share__label" id="shareLabel">Share this page</span>
          </button>
          <button type="button" class="qc-share__caret" id="shareCaret" aria-haspopup="menu" aria-expanded="false" aria-label="More share options">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="qc-share__menu" id="shareMenu" role="menu" hidden>
            <button type="button" role="menuitem" class="qc-share__item" data-share="markdown">
              <span>Copy as Markdown</span>
              <span class="qc-kbd qc-kbd--inline">Alt+S</span>
            </button>
            <button type="button" role="menuitem" class="qc-share__item" data-share="plain">
              <span>Copy as Plain text</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Shortcut legend -->
      <div class="qc__legend" aria-label="Keyboard shortcuts">
        <span class="qc-kbd">L</span>
        <span class="qc-kbd">P</span>
        <span class="qc-kbd">I</span>
        <span class="qc-kbd">T</span>
        <span class="qc-kbd">S</span>
      </div>

      <!-- Live region for SR -->
      <div class="qc__sr" id="liveRegion" role="status" aria-live="polite"></div>
    </aside>
  </main>

  <footer class="page-foot">
    QuickCopy POC v1 &mdash; Page Card Hub (mocked Marketplace SDK; all state is local)
  </footer>

  <script src="app.js"></script>
</body>
</html>
